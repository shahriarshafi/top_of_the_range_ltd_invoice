<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice Form</title>
    <link rel="stylesheet" href="../style.css"> <!-- Link to your CSS file -->
    
</head>
<body>
    <img id="logo" src="../logo.png" style="display: none" />
    <!-- LOGIN PAGE -->
<div id="login-container">
  <div class="login-box">
    <h2>Login</h2>
    <form id="login-form">
      <div class="input-group">
        <label for="username">Username</label>
        <input type="text" id="username" required>
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" required>
      </div>

      <button type="submit">Login</button>
    </form>
  </div>
</div>


  <!-- INVOICE FORM (hidden initially) -->
  <div id="invoice-container" style="display:none;">
    <h2 style="justify-self: center; font-family: 'Times New Roman', Times, serif;">INVOICE FORM</h2>
    <form id="invoice-form">
        <h3>Vehicle Details</h3>
        <label for="make">Make:</label><br>
        <input type="text" id="make" name="make" placeholder="Write the Maker's Name" style="font-family: 'Times New Roman', Times, serif;" required><br>

        <label for="model">Model:</label><br>
        <input type="text" id="model" name="model" placeholder="Write The Model Name" style="font-family: 'Times New Roman', Times, serif;" required><br>

        <label for="registration">Registration:</label><br>
        <input type="text" id="registration" name="registration" placeholder="Write The Registration Number" style="font-family: 'Times New Roman', Times, serif;" required><br>

        <label for="mileage">Mileage:</label><br>
        <input type="text" id="mileage" name="mileage" placeholder="Write the Mileage" style="font-family: 'Times New Roman', Times, serif;" required><br>

        <label for="date-of-sale">Date of Sale:</label><br>
        <input type="date" id="date-of-sale" name="date-of-sale" placeholder="Write the date of sale" style="font-family: 'Times New Roman', Times, serif;" required><br>

        <label for="time-of-sale">Time of Sale:</label><br>
        <input type="time" id="time-of-sale" name="time-of-sale" step="60"  placeholder="Write the Time of Sale" style="font-family: 'Times New Roman', Times, serif;" required><br>

        <h3>Buyer's Details</h3>
        <label for="full-name">Full Name:</label><br>
        <input type="text" id="full-name" name="full-name" placeholder="Write the Buyer's Name" style="font-family: 'Times New Roman', Times, serif;" required><br>

        <label for="address">Address:</label><br>
        <input type="text" id="address" name="address" placeholder="Write the Address" style="font-family: 'Times New Roman', Times, serif;" required><br>

        <label for="contact-number">Contact Number:</label><br>
        <input type="text" id="contact-number" name="contact-number" placeholder="Write the Contact Number" style="font-family: 'Times New Roman', Times, serif;" required><br>

        <label for="email-address">Email Address:</label><br>
        <input type="email" id="email-address" name="email-address" placeholder="Write the Email Address" style="font-family: 'Times New Roman', Times, serif;"><br>

        <h3>Payment Details</h3>
        <label for="price">Price:</label><br>
        <input type="text" id="price" name="price" placeholder="£" style="font-family: 'Times New Roman', Times, serif;" required><br>

        <label for="deposit">Deposit:</label><br>
        <input type="text" id="deposit" name="deposit" placeholder="£" style="font-family: 'Times New Roman', Times, serif;" required><br>

        <label for="dues">Dues:</label><br>
        <input type="text" id="dues" name="dues" placeholder="£" style="font-family: 'Times New Roman', Times, serif;" required><br>

        

        <h3>Warrenty</h3>
        <label for="full-paid">Warrenty:</label><br>
        <input type="text" id="full-paid" name="full-paid" placeholder="Write the days of warrenty" style="font-family: 'Times New Roman', Times, serif;" required><br>

        <button type="submit">Generate Invoice</button>
    </form>
  </div>
    

    <script src="../script.js"></script> <!-- Link to your JS file -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    
</body>
</html>
